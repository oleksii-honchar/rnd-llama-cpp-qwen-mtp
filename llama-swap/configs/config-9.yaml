# mammoth-lan llama-swap config9: Qwopus3.6-27B-v1-preview MTP Q6_K (native llama.cpp speculative decoding)
#   Source (target): https://huggingface.co/Jackrong/Qwopus3.6-27B-v1-preview-GGUF (Q6_K, ~22 GB)
#   Source (MTP layers): https://huggingface.co/am17an/Qwen3.6-27B-MTP-GGUF (Q8_0, ~27 GB)
#   Transplanted: Qwopus3.6-27B-v1-preview-MTP-Q6_K.gguf (Q6_K base + Q8_0 MTP layers, ~23-24 GB)
#
# Concurrency: **single-model** (no matrix, no groups) — MTP is experimental, keep it simple.
# Config9 is a **beta** config — uses Dockerfile.llama-cpp-beta with PR #22673 (native MTP).
#
# Model ID: qwopus36-27b-mtp
# Three aliases:
#   - qwopus36-27b-mtp (default, thinking on)
#   - qwopus36-27b-mtp-precise (thinking off, precise coding)
#   - qwopus36-27b-mtp-instruct (no thinking, instruct mode)
#
# MTP speculative decoding:
#   --spec-type mtp --spec-draft-n-max 3
#   ~72% draft acceptance, ~2.4× speedup (per PR #22673 author)
#
# VRAM estimate (Q6_K + Q4_0 K/V cache + MTP overhead):
#   Model weights: ~22 GB
#   K/V cache (Q4_0, 16k context): ~1 GB
#   MTP overhead (~10%): ~2-2.5 GB
#   Total: ~25-25.5 GB — comfortable on 32 GB RTX 5090
#
# Chat template: better-qwen3.6-chat-template.jinja
# 27B dense bug: preserve_thinking may be ignored (llama.cpp #22088 / #22255)
#
# yaml-language-server: $schema=https://raw.githubusercontent.com/mostlygeek/llama-swap/refs/heads/main/config-schema.json

healthCheckTimeout: 180
logToStdout: "both"
logLevel: "info"

models:
  qwopus36-27b:
    name: "Qwopus3.6-27B-v1-preview MTP Q6_K"
    aliases:
      - qwopus36-27b-precise
      - qwopus36-27b-instruct
    cmd: >
      llama-server
      --port ${PORT}
      --host 0.0.0.0
      --model /models/Qwopus3.6-27B-v1-preview-MTP-Q6_K.gguf
      --chat-template-file /models/better-qwen3.6-chat-template.jinja
      --jinja
      --flash-attn on
      --kv-unified
      --cache-type-k f16
      --cache-type-v q8_0
      --batch-size 2048
      --ubatch-size 512
      --ctx-size 128000
      --parallel 1
      --spec-type mtp
      --spec-draft-n-max 5
      --spec-draft-n-min 2
      --spec-draft-p-split 0.15
      --spec-draft-p-min 0.80
      --spec-draft-ngl auto
      --no-mmap
      --mlock
      --warmup
      --no-webui
      --perf
      --log-timestamps
      --log-prefix
      --threads 8
      --threads-batch 16
      --cache-ram 32768
      --ctx-checkpoints 32
      -ngl 99
    filters:
      stripParams: "temperature, top_p, top_k, min_p, presence_penalty, repeat_penalty, reasoning-budget, chat_template_kwargs"
      setParamsByID:
        qwopus36-27b:
          temperature: 1.0
          top_p: 1.0
          top_k: 25
          min_p: 0.2
          presence_penalty: 0.1
          repeat_penalty: 1.05
          reasoning-budget: 4096
          chat_template_kwargs:
            enable_thinking: true
            preserve_thinking: true
        qwopus36-27b-precise:
          temperature: 0.6
          top_p: 0.95
          top_k: 20
          min_p: 0.0
          presence_penalty: 0.0
          repeat_penalty: 1.0
          reasoning-budget: 4096
          chat_template_kwargs:
            enable_thinking: true
            preserve_thinking: true
        qwopus36-27b-instruct:
          temperature: 0.7
          top_p: 0.80
          top_k: 20
          min_p: 0.0
          presence_penalty: 1.5
          repeat_penalty: 1.0
          reasoning-budget: 0
          chat_template_kwargs:
            enable_thinking: false
            preserve_thinking: false
    checkEndpoint: /health
    proxy: http://127.0.0.1:${PORT}
    ttl: 300

